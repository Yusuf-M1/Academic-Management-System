<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Academic Management System — Sign in to manage academic records.">
    <title>Login — Academic Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="main-content" style="padding:0;max-width:none;">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;width:90%;max-width:420px;">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" role="alert">
                        <i class="bi {% if category == 'success' %}bi-check-circle-fill{% elif category == 'danger' %}bi-exclamation-triangle-fill{% else %}bi-info-circle-fill{% endif %}"></i>
                        {{ message }}
                        <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="login-page">
            <div class="login-card">
                <div class="brand">
                    <i class="bi bi-mortarboard-fill"></i>
                    <h1>Academic Management System</h1>
                    <p>Sign in to manage academic records</p>
                </div>
                <form method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
                </form>
                <div class="login-footer">
                    Default credentials: <strong>admin</strong> / <strong>admin123</strong>
                </div>
            </div>
        </div>
    </main>

    <script>
    // Auto-dismiss alerts after 5 seconds
    const alerts = document.querySelectorAll('.alert');
    if (alerts.length > 0) {
        setTimeout(function() {
            alerts.forEach(function(el) {
                el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                el.style.opacity = '0';
                el.style.transform = 'translateY(-10px)';
                setTimeout(function() { el.remove(); }, 400);
            });
        }, 5000);
    }
    </script>
</body>
</html>
