{% extends "base.html" %}
{% block title %}Edit Assignment — AMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-pencil-square"></i> Edit Assignment</h1>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Student</label>
                <select name="student_id" required>
                    {% for s in students %}<option value="{{ s.student_id }}" {% if s.student_id == record.student_id %}selected{% endif %}>{{ s.roll_number }} — {{ s.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" value="{{ record.subject }}" required>
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ record.title }}" required>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" name="due_date" value="{{ record.due_date }}" required>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Pending" {% if record.status=='Pending' %}selected{% endif %}>Pending</option>
                    <option value="Submitted" {% if record.status=='Submitted' %}selected{% endif %}>Submitted</option>
                    <option value="Late" {% if record.status=='Late' %}selected{% endif %}>Late</option>
                </select>
            </div>
            <div class="form-group">
                <label>Marks Awarded</label>
                <input type="number" name="marks_awarded" step="0.01" min="0" value="{{ record.marks_awarded or '' }}">
            </div>
            <div class="form-group full-width">
                <label>Feedback</label>
                <textarea name="feedback" rows="2">{{ record.feedback or '' }}</textarea>
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update</button>
            <a href="{{ url_for('assignments') }}" class="btn btn-danger"><i class="bi bi-x-lg"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
