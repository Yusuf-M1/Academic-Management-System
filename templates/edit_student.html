{% extends "base.html" %}
{% block title %}Edit Student — AMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-pencil-square"></i> Edit Student</h1>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" name="roll_number" value="{{ student.roll_number }}" required>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" value="{{ student.full_name }}" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" value="{{ student.department }}" required>
            </div>
            <div class="form-group">
                <label>Semester</label>
                <input type="number" name="semester" value="{{ student.semester }}" min="1" max="8" required>
            </div>
            <div class="form-group">
                <label>Section</label>
                <input type="text" name="section" value="{{ student.section }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ student.email or '' }}">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone_number" value="{{ student.phone_number or '' }}">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" value="{{ student.dob or '' }}">
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update</button>
            <a href="{{ url_for('students') }}" class="btn btn-danger"><i class="bi bi-x-lg"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
