{% extends "base.html" %}
{% block title %}Edit Project — AMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-pencil-square"></i> Edit Project Submission</h1>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Student</label>
                <select name="student_id" required>
                    {% for s in students %}<option value="{{ s.student_id }}" {% if s.student_id == record.student_id %}selected{% endif %}>{{ s.roll_number }} — {{ s.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" name="project_title" value="{{ record.project_title }}" required>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" value="{{ record.subject }}" required>
            </div>
            <div class="form-group">
                <label>Submission Date</label>
                <input type="date" name="submission_date" value="{{ record.submission_date or '' }}">
            </div>
            <div class="form-group">
                <label>Guide Name</label>
                <input type="text" name="guide_name" value="{{ record.guide_name }}" required>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Pending" {% if record.status=='Pending' %}selected{% endif %}>Pending</option>
                    <option value="Submitted" {% if record.status=='Submitted' %}selected{% endif %}>Submitted</option>
                    <option value="Approved" {% if record.status=='Approved' %}selected{% endif %}>Approved</option>
                    <option value="Rejected" {% if record.status=='Rejected' %}selected{% endif %}>Rejected</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>Remarks</label>
                <textarea name="remarks" rows="2">{{ record.remarks or '' }}</textarea>
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update</button>
            <a href="{{ url_for('projects') }}" class="btn btn-danger"><i class="bi bi-x-lg"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
