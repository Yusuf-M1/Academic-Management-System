{% extends "base.html" %}
{% block title %}Edit Marks — AMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-pencil-square"></i> Edit Marks Entry</h1>
</div>
<div class="form-card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Student</label>
                <select name="student_id" required>
                    {% for s in students %}<option value="{{ s.student_id }}" {% if s.student_id == record.student_id %}selected{% endif %}>{{ s.roll_number }} — {{ s.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" value="{{ record.subject }}" required>
            </div>
            <div class="form-group">
                <label>Test Name</label>
                <input type="text" name="test_name" value="{{ record.test_name }}" required>
            </div>
            <div class="form-group">
                <label>Assignment Marks</label>
                <input type="number" name="assignment_marks" step="0.01" min="0" value="{{ record.assignment_marks }}">
            </div>
            <div class="form-group">
                <label>Quiz Marks</label>
                <input type="number" name="quiz_marks" step="0.01" min="0" value="{{ record.quiz_marks }}">
            </div>
            <div class="form-group">
                <label>Internal Exam Marks</label>
                <input type="number" name="internal_exam_marks" step="0.01" min="0" value="{{ record.internal_exam_marks }}">
            </div>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update</button>
            <a href="{{ url_for('marks') }}" class="btn btn-danger"><i class="bi bi-x-lg"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
